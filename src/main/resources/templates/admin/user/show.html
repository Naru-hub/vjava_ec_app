<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>会員詳細</title>
    <link rel="stylesheet" href="/css/style.css"> <!-- 必要に応じてCSSをリンク -->
</head>
<body>
    <h1>会員詳細ページ</h1>

    <div>
        <table>
            <tr>
                <th>ID</th>
                <td th:text="${member.id}">1</td>
            </tr>
            <tr>
                <th>名前</th>
                <td th:text="${member.name}">山田 太郎</td>
            </tr>
            <tr>
                <th>メールアドレス</th>
                <td th:text="${member.email}">yamada@example.com</td>
            </tr>
            <tr>
                <th>郵便番号</th>
                <td th:text="${member.postalCode}">123-4567</td>
            </tr>
            <tr>
                <th>住所</th>
                <td th:text="${member.address}">東京都渋谷区</td>
            </tr>
            <tr>
                <th>電話番号</th>
                <td th:text="${member.phoneNumber}">090-1234-5678</td>
            </tr>
            <tr>
                <th>会員ステータス</th>
                <td th:text="${member.status}">アクティブ</td>
            </tr>
            <tr>
                <th>登録日時</th>
                <td th:text="${member.createdAt}">2024-01-01 10:00</td>
            </tr>
            <tr>
                <th>更新日時</th>
                <td th:text="${member.updatedAt}">2024-01-15 15:30</td>
            </tr>
        </table>
    </div>

    <!-- 会員ステータス変更確認ボタン -->
    <div>
        <form th:action="@{/member/status/confirm/{id}(id=${member.id})}" method="post">
            <input type="submit" value="会員ステータス変更確認">
        </form>
    </div>

    <!-- 一覧へ戻るボタン -->
    <div>
        <button type="button" th:onclick="|window.location='@{/member/list}'|">一覧へ戻る</button>
    </div>
</body>
</html>
